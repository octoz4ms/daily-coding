server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    # Nacos 配置
    nacos:
      discovery:
        server-addr: 115.190.171.200:8848
        namespace: public
      config:
        enabled: false
        # server-addr: localhost:8848
        # file-extension: yaml
        # namespace: public
    # Gateway 路由配置
    gateway:
      discovery:
        locator:
          enabled: true  # 开启从注册中心动态创建路由的功能
          lower-case-service-id: true  # 使用小写服务名
      routes:
        # 用户服务路由
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        # 订单服务路由
        - id: order-service-route
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        # 商品服务路由
        - id: product-service-route
          uri: lb://product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

    # Sentinel 配置
    sentinel:
      transport:
        dashboard: localhost:8888
        port: 8719
      eager: true

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
