server:
  port: 8080

spring:
  application:
    name: payment-system
  profiles:
    active: dev

# Redis配置
redis:
  host: localhost
  port: 6379
  password:
  database: 0
  timeout: 2000ms
  lettuce:
    pool:
      max-active: 8
      max-wait: -1ms
      max-idle: 8
      min-idle: 0

# 微信支付配置
wechat:
  pay:
    app-id: your_wechat_app_id
    mch-id: your_merchant_id
    private-key-path: classpath:cert/apiclient_key.pem
    merchant-serial-number: your_merchant_serial_number
    api-v3-private-key: your_api_v3_private_key
    notify-url: http://your-domain.com/api/payment/wechat/callback

# 支付宝配置
alipay:
  app-id: your_alipay_app_id
  private-key: your_private_key
  public-key: your_public_key
  notify-url: http://your-domain.com/api/payment/alipay/callback
  return-url: http://your-domain.com/payment/success
  gateway-url: https://openapi.alipay.com/gateway.do

# 支付配置
payment:
  expire-time: 30  # 支付订单过期时间(分钟)
  callback-retry-times: 3  # 回调重试次数

logging:
  level:
    com.octo.payment: DEBUG
    com.wechat.pay: DEBUG
    com.alipay: DEBUG
