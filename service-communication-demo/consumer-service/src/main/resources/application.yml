server:
  port: 8082

spring:
  application:
    name: consumer-service

provider:
  service:
    # 本地启动时使用 localhost；跨服务器部署时改成 http://目标服务器IP:8081 或网关地址
    url: ${PROVIDER_SERVICE_URL:http://localhost:8081}

deployment:
  # local: 本地联调；remote: 跨服务器/跨环境部署
  mode: ${DEPLOYMENT_MODE:local}

# Feign 配置
spring.cloud.openfeign:
  # 启用降级
  circuitbreaker:
    enabled: true
  # 超时配置
  client:
    config:
      default:
        # 连接超时时间
        connectTimeout: 5000
        # 读取超时时间
        readTimeout: 5000
        # 日志级别: NONE, BASIC, HEADERS, FULL
        loggerLevel: BASIC

# 日志配置
logging:
  level:
    root: INFO
    com.octo.demo: DEBUG
    # Feign 日志
    com.octo.demo.common.client: DEBUG

